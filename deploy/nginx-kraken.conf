server {
    listen 80;
    server_name kraken.expertintheloop.io;

    # Redirect HTTP to HTTPS (certbot will manage SSL)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name kraken.expertintheloop.io;

    # SSL certificates managed by certbot
    # ssl_certificate /etc/letsencrypt/live/kraken.expertintheloop.io/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/kraken.expertintheloop.io/privkey.pem;

    root /home/ubuntu/kraken-chatbot/dist/public;
    index index.html;

    # SPA fallback — serve index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # WebSocket proxy — long-lived connections for pipeline queries
    location /ws/chat {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # API proxy
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health endpoint
    location /health {
        proxy_pass http://127.0.0.1:8000;
    }

    # Readiness endpoint
    location /ready {
        proxy_pass http://127.0.0.1:8000;
    }
}
